spring.application.name=backend
server.port=${PORT:8080}
#server.servlet.session.cookie.same-site=none
#server.servlet.session.cookie.secure=true
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/farmer_retailer_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Chetna@202005}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Optimized HikariCP for Render/Neon
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=true

# Cashfree Configuration
cashfree.app.id=${CASHFREE_APP_ID:YOUR_CASHFREE_APP_ID}
cashfree.secret.key=${CASHFREE_SECRET_KEY:YOUR_CASHFREE_SECRET_KEY}
cashfree.api.url=https://sandbox.cashfree.com/pg

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}

# External API Keys (Weather & Location)
weather.api.key=${WEATHER_API_KEY:YOUR_WEATHER_API_KEY}
location.api.key=${LOCATION_API_KEY:YOUR_LOCATION_API_KEY}
